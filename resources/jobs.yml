resources:
  jobs:
    ml_pipeline_job:

      name: ml-pipeline-job

      tasks:
        - task_key: run_pipeline

          spark_python_task:
            python_file: ./src/pipelines/run_pipeline.py

          job_cluster_key: job_cluster

      job_clusters:
        - job_cluster_key: job_cluster

          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2