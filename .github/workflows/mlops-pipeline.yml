name: Water Quality MLOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run model monitoring daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  PYTHON_VERSION: '3.10'
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  #  Test Job
  test:
    name:  Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name:  Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache Dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black
        
    - name:  Code Quality Check
      run: |
        # Check code formatting
        black --check --diff src/ tests/
        
        # Lint code
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name:  Run Unit Tests
      run: |
        python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
        
    - name:  Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

  #  Build and Deploy Job
  deploy:
    name:  Deploy to Databricks
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    strategy:
      matrix:
        environment: [dev]  # Add staging, prod as needed
        
    environment: ${{ matrix.environment }}
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Databricks CLI
      run: |
        pip install databricks-cli
        
    - name: Configure Databricks CLI
      run: |
        echo "[DEFAULT]" > ~/.databrickscfg
        echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
        echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg
        
    - name: Validate Bundle Configuration
      run: |
        databricks bundle validate --target ${{ matrix.environment }}
        
    - name: Deploy Bundle
      run: |
        databricks bundle deploy --target ${{ matrix.environment }}
        
    - name: Run Integration Tests
      run: |
        # Run the ML pipeline to ensure everything works
        databricks bundle run ml_pipeline_job_v2 --target ${{ matrix.environment }}

  # Model Monitoring Job
  monitor:
    name:  Model Monitoring
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_environment != '')
    
    steps:
    - name:  Checkout Code
      uses: actions/checkout@v4
      
    - name:  Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name:  Install Dependencies
      run: |
        pip install databricks-cli mlflow pandas numpy scipy scikit-learn
        
    - name:  Configure Databricks CLI
      run: |
        echo "[DEFAULT]" > ~/.databrickscfg
        echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
        echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg
        
    - name:  Run Model Monitoring
      run: |
        python scripts/model_monitoring.py
        
    - name:  Send Monitoring Report
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: ' Model Monitoring Alert',
            body: `
            ##  Model Performance Alert
            
            The automated model monitoring job has detected issues that require attention.
            
            **Timestamp:** ${new Date().toISOString()}
            **Environment:** ${{ github.event.inputs.deploy_environment || 'prod' }}
            **Workflow:** ${context.workflow}
            **Run ID:** ${context.runId}
            
            ### Possible Issues:
            - Model performance degradation
            - Data drift detected
            - API endpoint failures
            - Feature store inconsistencies
            
            ### Actions Required:
            1. Review the monitoring dashboard
            2. Check recent data quality
            3. Consider model retraining
            4. Investigate data pipeline health
            
            **View Details:** [Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `,
            labels: ['monitoring', 'alert', 'high-priority']
          })

  #  Cleanup Job
  cleanup:
    name:  Cleanup Old Resources
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name:  Checkout Code
      uses: actions/checkout@v4
      
    - name:  Install Databricks CLI
      run: |
        pip install databricks-cli mlflow
        
    - name:  Configure Databricks CLI
      run: |
        echo "[DEFAULT]" > ~/.databrickscfg
        echo "host = $DATABRICKS_HOST" >> ~/.databrickscfg
        echo "token = $DATABRICKS_TOKEN" >> ~/.databrickscfg
        
    - name:  Clean Old Model Versions
      run: |
        python scripts/cleanup_old_models.py
        
    - name:  Archive Old Experiments
      run: |
        python scripts/archive_experiments.py

  #  Security Scan
  security:
    name:  Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name:  Checkout Code
      uses: actions/checkout@v4
      
    - name:  Run Security Scan
      uses: github/super-linter@v4
      env:
        DEFAULT_BRANCH: main
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        VALIDATE_PYTHON_BLACK: true
        VALIDATE_PYTHON_FLAKE8: true
        
    - name:  Scan Dependencies
      run: |
        pip install safety bandit
        safety check -r requirements.txt
        bandit -r src/ -f json -o bandit-report.json
        
    - name: Upload Security Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-report
        path: bandit-report.json